services:
  - type: web
    name: ai-studio
    env: docker
    plan: free
    healthCheckPath: /api/health/live
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: RUN_MIGRATIONS
        value: true
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 5000
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: AUTH_REQUIRED
        value: true
      - key: ALLOW_REGISTRATION
        value: false
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: SESSION_COOKIE_SAMESITE
        value: Lax
      - key: SECURITY_HEADERS_ENABLED
        value: true
      - key: ENABLE_HSTS
        value: true
      - key: TRUST_PROXY_HEADERS
        value: true
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_MODELS
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: embeddinggemma
      - key: EMBEDDING_PROVIDER
        value: auto
      - key: ALLOW_HASH_EMBEDDING_FALLBACK
        value: true
      - key: OCR_ENABLED
        value: true
      - key: TESSERACT_CMD
        value: /usr/bin/tesseract
      - key: RATE_LIMIT_ENABLED
        value: true
