name: ai-studio

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_studio_db}
      POSTGRES_USER: ${POSTGRES_USER:-ai_studio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.docker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - ai_studio_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env.docker}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-Lax}
      REMEMBER_COOKIE_DAYS: ${REMEMBER_COOKIE_DAYS:-30}
      LOGIN_MAX_ATTEMPTS: ${LOGIN_MAX_ATTEMPTS:-5}
      LOGIN_LOCK_MINUTES: ${LOGIN_LOCK_MINUTES:-15}
      PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH:-10}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-ai_studio}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ai_studio_db}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_MODELS: ${OPENAI_MODELS:-gpt-4o-mini}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-embeddinggemma}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-450}
      RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-80}
      VISION_MODEL: ${VISION_MODEL:-}
      MAX_CONTENT_LENGTH: ${MAX_CONTENT_LENGTH:-26214400}
      ATTACHMENT_MAX_FILES: ${ATTACHMENT_MAX_FILES:-5}
      ATTACHMENT_MAX_FILE_BYTES: ${ATTACHMENT_MAX_FILE_BYTES:-20971520}
      ATTACHMENT_MAX_TOTAL_BYTES: ${ATTACHMENT_MAX_TOTAL_BYTES:-41943040}
      SOCIAL_MAX_MANUAL_CHARACTERS: ${SOCIAL_MAX_MANUAL_CHARACTERS:-200000}
      SOCIAL_MIN_TEXT_CHARACTERS: ${SOCIAL_MIN_TEXT_CHARACTERS:-40}
      OCR_ENABLED: ${OCR_ENABLED:-true}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-eng}
      TESSERACT_CMD: /usr/bin/tesseract
      WEBSITE_CONNECT_TIMEOUT: ${WEBSITE_CONNECT_TIMEOUT:-5}
      WEBSITE_READ_TIMEOUT: ${WEBSITE_READ_TIMEOUT:-15}
      WEBSITE_MAX_RESPONSE_BYTES: ${WEBSITE_MAX_RESPONSE_BYTES:-2000000}
      WEBSITE_MAX_REDIRECTS: ${WEBSITE_MAX_REDIRECTS:-3}
      WEBSITE_MAX_TEXT_CHARACTERS: ${WEBSITE_MAX_TEXT_CHARACTERS:-500000}
      WEBSITE_MIN_TEXT_CHARACTERS: ${WEBSITE_MIN_TEXT_CHARACTERS:-120}
      WEBSITE_RESPECT_ROBOTS: ${WEBSITE_RESPECT_ROBOTS:-true}
      WEBSITE_USER_AGENT: ${WEBSITE_USER_AGENT:-AI-Studio-KnowledgeIndexer/1.0}
      WEBSITE_CRAWLER_DEFAULT_MAX_PAGES: ${WEBSITE_CRAWLER_DEFAULT_MAX_PAGES:-25}
      WEBSITE_CRAWLER_MAX_PAGES: ${WEBSITE_CRAWLER_MAX_PAGES:-100}
      WEBSITE_CRAWLER_DEFAULT_DEPTH: ${WEBSITE_CRAWLER_DEFAULT_DEPTH:-2}
      WEBSITE_CRAWLER_MAX_DEPTH: ${WEBSITE_CRAWLER_MAX_DEPTH:-5}
      WEBSITE_CRAWLER_DISCOVERY_BYTES: ${WEBSITE_CRAWLER_DISCOVERY_BYTES:-750000}
      WEBSITE_CRAWLER_SITEMAP_BYTES: ${WEBSITE_CRAWLER_SITEMAP_BYTES:-1000000}
      WEBSITE_CRAWLER_MAX_SITEMAPS: ${WEBSITE_CRAWLER_MAX_SITEMAPS:-8}
      AUTO_CREATE_DATABASE: "false"
      SECURITY_HEADERS_ENABLED: "true"
      ENABLE_HSTS: ${ENABLE_HSTS:-false}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HOST: 0.0.0.0
      PORT: 5000
      WAITRESS_THREADS: ${WAITRESS_THREADS:-8}
      RUN_MIGRATIONS: "true"
    ports:
      - "${APP_PORT:-5000}:5000"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai_studio_network

volumes:
  postgres_data:
  uploads_data:
  logs_data:

networks:
  ai_studio_network:
    driver: bridge
